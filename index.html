<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>感染性废弃物处理记录</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: #eef1f6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.10);
    padding: 36px 40px 32px;
    width: 100%;
    max-width: 680px;
  }
  h1 {
    text-align: center;
    font-size: 20px;
    color: #1a237e;
    letter-spacing: 3px;
    margin-bottom: 28px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead tr { background: #1a237e; }
  th {
    color: #fff;
    padding: 13px 10px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    border: 1px solid #283593;
  }
  tbody tr:nth-child(odd)  { background: #fff; }
  tbody tr:nth-child(even) { background: #f3f6fc; }
  tbody tr:hover { background: #e8edf8; }
  td {
    border: 1px solid #dde3f0;
    padding: 14px 10px;
    text-align: center;
    font-size: 17px;
    color: #222;
    font-variant-numeric: tabular-nums;
  }
  td:first-child {
    color: #1a237e;
    font-weight: 700;
    font-size: 15px;
    width: 52px;
  }
  .controls {
    text-align: center;
    margin-top: 24px;
  }
  button {
    padding: 10px 36px;
    font-size: 15px;
    cursor: pointer;
    border: none;
    background: #1a237e;
    color: #fff;
    border-radius: 6px;
    letter-spacing: 2px;
    transition: background 0.15s;
  }
  button:hover { background: #283593; }
</style>
</head>
<body>
<div class="card">
  <h1>感染性废弃物处理记录</h1>
  <table>
    <thead>
      <tr>
        <th>序号</th>
        <th>重量（kg）</th>
        <th>浓度</th>
        <th>开始时间</th>
        <th>结束时间</th>
      </tr>
    </thead>
    <tbody>
      <tr><td>1</td><td id="r1c1"></td><td id="r1c2"></td><td id="r1c3"></td><td id="r1c4"></td></tr>
      <tr><td>2</td><td id="r2c1"></td><td id="r2c2"></td><td id="r2c3"></td><td id="r2c4"></td></tr>
      <tr><td>3</td><td id="r3c1"></td><td id="r3c2"></td><td id="r3c3"></td><td id="r3c4"></td></tr>
      <tr><td>4</td><td id="r4c1"></td><td id="r4c2"></td><td id="r4c3"></td><td id="r4c4"></td></tr>
    </tbody>
  </table>
  <div class="controls">
    <button onclick="generate()">重新生成</button>
  </div>
</div>

<script>
function randFloat(min, max, decimals) {
  return (Math.random() * (max - min) + min).toFixed(decimals);
}
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}
function fmt(totalMin) {
  totalMin = ((totalMin % 1440) + 1440) % 1440;
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
}

function generate() {
  // 第1条记录起始时间：09:10 - 09:40
  const s1 = 9 * 60 + 10 + randInt(0, 30);
  const e1 = s1 + 125 + randInt(-10, 10);
  const s2 = e1 + 25 + randInt(-10, 10);
  const e2 = s2 + 125 + randInt(-10, 10);
  const s3 = e2 + 25 + randInt(-10, 10);
  const e3 = s3 + 125 + randInt(-10, 10);
  const s4 = e3 + 25 + randInt(-10, 10);
  const e4 = s4 + 125 + randInt(-10, 10);

  const starts = [s1, s2, s3, s4];
  const ends   = [e1, e2, e3, e4];

  for (let i = 1; i <= 4; i++) {
    document.getElementById('r' + i + 'c1').textContent = randFloat(3.60, 4.40, 2);
    document.getElementById('r' + i + 'c2').textContent = randFloat(0.105, 0.115, 3);
    document.getElementById('r' + i + 'c3').textContent = fmt(starts[i - 1]);
    document.getElementById('r' + i + 'c4').textContent = fmt(ends[i - 1]);
  }
}

generate();
</script>
</body>
</html>
